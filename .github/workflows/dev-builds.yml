name: Dev Builds (Android + Windows)

on:
  workflow_dispatch:
  push:
    branches: [master, develop, 'release/**']
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.tauri.config.ts'
      - '.github/workflows/dev-builds.yml'

concurrency:
  group: dev-builds-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  android-debug:
    name: Android debug APK (arm64)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Configure git safe directory
        run: git config --global --add safe.directory '*'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept licenses & set NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          # Use the NDK the runner already has — auto-detect from ANDROID_HOME/ndk/
          NDK_VERSION=$(ls "$ANDROID_HOME/ndk" | sort -V | tail -1)
          echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV
          echo "Using NDK: $NDK_VERSION"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: "pnpm"

      - name: Install Rust stable with Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "tauri-android"

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: Run RustSec audit
        run: cargo audit
        working-directory: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:once

      - name: Run TypeScript checks
        run: pnpm typecheck

      - name: Run Convex typecheck
        run: pnpm exec tsc -p convex/tsconfig.json --noEmit

      - name: Run lint (non-mutating)
        run: pnpm lint:check

      - name: Initialize Android target
        run: pnpm exec tauri android init --ci

      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        id: doppler
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Build debug APK
        env:
          VITE_CONVEX_URL: ${{ env.VITE_CONVEX_URL || steps.doppler.outputs.VITE_CONVEX_URL }}
        run: pnpm exec tauri android build --ci --debug --apk -t aarch64

      - name: Upload Android artifact
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: socialglowz-android-debug
          path: src-tauri/gen/android/app/build/outputs/**/*.apk
          if-no-files-found: error
          retention-days: 1

  windows-test:
    if: false  # Paused — no Windows PC to test
    name: Windows test installer
    runs-on: blacksmith-2vcpu-windows-2025
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Configure git safe directory
        run: git config --global --add safe.directory '*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "tauri-windows"

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: Run RustSec audit
        run: cargo audit
        working-directory: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows bundle
        run: pnpm exec tauri build --ci

      - name: Upload Windows artifact
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: socialglowz-windows-test
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 1
